<!DOCTYPE html>
<html lang="es" data-bs-theme="dark"> <!-- data-bs-theme="dark" es para cambiar el tema al conenido -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}🏋️‍♀️</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="container py-3">
            <h1 class="text-center display-4">{{ titulo }}🏋️‍♀️ </h1>
        </div>

        <!-- grid principal -->
         <div class="container-fluid pb-3">
            <div class="d-grid gap-3" style="grid-template-columns: 1fr 2fr;">
                
                <!-- contenedor del form -->
                <div class="border rounded-3 p-2">
                    <form action="/guardar" method="post" autocomplete="off">
                        <!-- nombre -->
                         <div class="form-floating py-2">
                            <input type="text" class="form-control" id="nombre" placeholder="Nombre">
                            <label for="nombre">Nombre</label>
                         </div>
                        <!-- apellido -->
                         <div class="form-floating py-2">
                            <input type="text" class="form-control" id="apellido" placeholder="Apellido">
                            <label for="apellido">Apellido</label>
                         </div>
                        <!-- membresia -->
                         <div class="form-floating py-2">
                            <input type="number" class="form-control" id="membresia" placeholder="Membresia">
                            <label for="membresia">Membresia</label>
                         </div>

                         <!-- botones -->
                          <div class="text-center py-2">
                            <button type="submit" class="btn btn-success  me-3 rounded-pill" title="aaa">Guardar <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M16.59 7.58L10 14.17l-3.59-3.58L5 12l5 5l8-8zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10s10-4.48 10-10S17.52 2 12 2m0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8s8 3.58 8 8s-3.58 8-8 8"/></svg></button>
                            <button type="reset" class="btn btn-warning  rounded-pill">Limpiar <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="m16.536 15.947l2.121-2.122l-3.182-3.182l3.536-3.535l-2.122-2.122l-3.535 3.536l-3.182-3.182L8.05 7.46zM13.354 5.693l2.828-2.828a1 1 0 0 1 1.414 0l3.536 3.536a1 1 0 0 1 0 1.414l-2.829 2.828l2.475 2.475a1 1 0 0 1 0 1.414L13 22.311a1 1 0 0 1-1.414 0l-9.9-9.9a1 1 0 0 1 0-1.414l7.779-7.778a1 1 0 0 1 1.414 0z"/></svg></button>
                          </div>
                    </form> 
                </div>
                <!-- contenedor del listado de clientes -->
                 <div class="border rounded-3 p-2">
                    <table class="table table-striped table-hover">
                        <thead class="table-warning">
                            <th>Id</th>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Membresia</th>
                            <th>Acciones</th>
                        </thead>
                        <tbody>
                            {% for cliente in clientes %}
                            <tr>
                            <td>{{cliente.id}}</td>
                            <td>{{cliente.nombre}}</td>
                            <td>{{cliente.apellido}}</td>
                            <td>{{cliente.membresia}}</td>
                            <td>
                                <!-- <div class="text-center"> -->
                                    
                                    <a href="/editar/{{cliente.id}}" class="btn btn-sm btn-primary rounded-pill" title="Editar">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" fill-opacity="0" d="M14 6l4 4l3 -3l-4 -4Z"><animate fill="freeze" attributeName="fill-opacity" begin="1s" dur="0.4s" to="1"/></path><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path stroke-dasharray="44" stroke-dashoffset="44" d="M7 17v-4l10 -10l4 4l-10 10h-4"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.3s" dur="0.5s" to="0"/></path><path stroke-dasharray="20" d="M3 21h18"><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.3s" values="20;0"/></path><path stroke-dasharray="8" stroke-dashoffset="8" d="M14 6l4 4"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.8s" dur="0.2s" to="0"/></path></g></svg>
                                    </a>
                                    <a href="/eliminar/{{cliente.id}}" class="btn btn-sm btn-danger rounded-pill" title="Eliminar">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path stroke-dasharray="24" d="M12 20h5c0.5 0 1 -0.5 1 -1v-14M12 20h-5c-0.5 0 -1 -0.5 -1 -1v-14"><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.5s" values="24;0"/></path><path stroke-dasharray="18" stroke-dashoffset="18" d="M4 5h16"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.5s" dur="0.3s" to="0"/></path><path stroke-dasharray="10" stroke-dashoffset="10" d="M10 4h4M10 9v7M14 9v7"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.8s" dur="0.2s" to="0"/></path></g></svg>
                                    </a>
                                    
                                <!-- </div> -->
                            </td>
                            </tr>

                            {% endfor %}
                        </tbody>
                    </table>
                 </div>

            </div>

         </div>

         
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
